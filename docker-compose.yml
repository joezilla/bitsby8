version: '3.8'

services:
  bitsby8:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./disks:/data/disks
      - ./cassettes:/data/cassettes
      - ./scripts:/data/scripts
      # NOTE: renaming this named volume from the old `fdcplus-db` orphans
      # the previous volume. To keep existing data, either keep the old
      # volume name mapped to /data, or `docker volume` migrate its
      # contents — the daemon renames fdcplus.db → bitsby8.db in place on
      # first start once /data points at the existing volume.
      - bitsby8-db:/data
    restart: unless-stopped
    # For serial port access (uncomment and adjust as needed):
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    #   - /dev/ttyUSB1:/dev/ttyUSB1
    # privileged: true  # Required for GPIO on Raspberry Pi

volumes:
  bitsby8-db:
