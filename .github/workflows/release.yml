name: Release

# Build the Debian package and publish it to GitHub Releases whenever a
# semver tag is pushed. `debian/control` declares `Architecture: all`, so
# the same .deb installs on any Pi (arm64 or armhf).
#
# Cutting a release:
#   git tag v2.0.0
#   git push origin v2.0.0
#
# A pre-release tag with a hyphen (v2.0.0-rc1) auto-flips `prerelease: true`
# so the "Latest release" badge stays on the last stable.
on:
  push:
    tags: ['v*']
  # Also allow one-off runs from the Actions tab (e.g. re-run a release
  # after fixing a workflow bug without minting a new tag).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v2.0.0)'
        required: true

permissions:
  contents: write   # required for softprops/action-gh-release
  packages: read    # fetch @joezilla/8sim from GitHub Packages

jobs:
  build-deb:
    name: Build .deb and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          # `make deb` derives the Debian revision from `git rev-list --count`,
          # so shallow clones would produce a version like "2.0.0-1+g..." on
          # every build. Fetch everything.
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Keep in sync with `packageManager` in package.json and .github/workflows/ci.yml.
          version: 11.2.2

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Debian packaging tools
        # build-essential is required by dpkg-checkbuilddeps (implicit
        # `build-essential:native` on every source package). debhelper
        # + devscripts give us dh, dpkg-buildpackage, etc.
        run: sudo apt-get update && sudo apt-get install -y build-essential debhelper devscripts

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build .deb
        run: make deb

      - name: Show built artifacts
        run: ls -la build/

      - name: Publish GitHub Release
        # Using gh CLI directly (instead of softprops/action-gh-release) so
        # the workflow is idempotent under retags. softprops hit a
        # "tag_name already_exists" validation error on its finalize step
        # whenever a release already existed for the tag — see the aborted
        # v2.0.1-rc2 run.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag || github.ref_name }}"

          # v1.2.3-rc1 → prerelease; v1.2.3 → stable.
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          ASSETS=( build/*.deb build/*.buildinfo build/*.changes )

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — replacing assets in place."
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            echo "Creating fresh release $TAG."
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG \
              "${ASSETS[@]}"
          fi
