name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test + build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Version is also pinned via `packageManager` in package.json.
          version: 11.2.2

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck (backend)
        run: pnpm run typecheck

      - name: Typecheck (frontend / svelte-check)
        run: pnpm --filter fdcplus-frontend typecheck

      # The serial-mock test suite has a known intermittent race (see
      # cleanup-epic deferred-work). Retry once before failing the build.
      - name: Test
        run: pnpm run test || pnpm run test

      - name: Build (both trees)
        run: pnpm run build:all
