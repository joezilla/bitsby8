name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test + build (Node 22)
    runs-on: ubuntu-latest

    # Read the @joezilla/8sim package from GitHub Packages with the built-in
    # GITHUB_TOKEN (no extra secret). The project .npmrc maps the @joezilla
    # scope to npm.pkg.github.com and reads NODE_AUTH_TOKEN.
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Version is also pinned via `packageManager` in package.json.
          version: 11.2.2

      # package.json's `engines` requires Node >= 22. Older Node lines
      # trip type errors against @types/node@22, and some of our newer
      # stdlib usage relies on 22-era APIs.
      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Typecheck (backend)
        run: pnpm run typecheck

      - name: Typecheck (frontend / svelte-check)
        run: pnpm --filter fdcplus-frontend typecheck

      # The serial-mock test suite has a known intermittent race (see
      # cleanup-epic deferred-work). Retry once before failing the build.
      - name: Test
        run: pnpm run test || pnpm run test

      - name: Build (both trees)
        run: pnpm run build:all
